name: Build Tranchedino cipher catalogue

on:
  pull_request:
    branches:
      - chatgpt/onedrive-cipher-inventory-20260712

permissions:
  contents: read

jobs:
  catalogue:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr tesseract-ocr-ita tesseract-ocr-eng

      - name: Install Python dependencies
        run: python -m pip install requests pymupdf pillow opencv-python-headless numpy

      - name: Build catalogue and facsimile bundle
        env:
          OUT_DIR: tranchedino_output
        run: python tools/catalogue_tranchedino.py

      - name: Package output
        run: zip -r -0 tranchedino_cipher_catalogue_bundle.zip tranchedino_output

      - name: Upload catalogue artifact
        uses: actions/upload-artifact@v4
        with:
          name: tranchedino-cipher-catalogue
          path: tranchedino_cipher_catalogue_bundle.zip
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
