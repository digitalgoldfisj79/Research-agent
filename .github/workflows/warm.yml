name: warm-research

# Pings /research?warm=1 every 5 min. The endpoint loads gte-small into the
# container and returns {warmed:true} without hitting LLM, gates, or DB.
# $0 cost, no DB row. Purpose: eliminate the ~17s classifier cold-start that
# real qa users would otherwise pay on the first request to a cold container.
#
# Required secret:
#   SUPABASE_PROJECT_REF   (e.g. ymaqlcfjmdwncdbjprmw)
#
# Distinct from heartbeat.yml:
#   heartbeat.yml = daily, anti-pause for the Supabase free-tier
#   warm.yml      = every 5 min, cold-start mitigation for /research
#
# Reversibility: delete this file, or disable in the Actions tab, or set
# research back to v1.0.4 (the ?warm=1 endpoint then just 405s and the warmer
# becomes a no-op).

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes (best-effort; GH may delay 5-15 min under load)
  workflow_dispatch:        # manual trigger button

concurrency:
  group: warm-research
  cancel-in-progress: false

jobs:
  warm:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Warm /research via ?warm=1
        env:
          REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -u
          if [ -z "${REF}" ]; then
            echo "::error::SUPABASE_PROJECT_REF secret is not set"; exit 1
          fi
          URL="https://${REF}.supabase.co/functions/v1/research?warm=1"
          http_status=$(
            curl -sS -m 60 -o /tmp/warm.json \
                 -w '%{http_code}' \
                 -X GET "${URL}" \
                 -H 'User-Agent: gh-actions-warm/1.0'
          )
          echo "warm ping -> HTTP ${http_status}"
          echo "body: $(cat /tmp/warm.json)"
          case "${http_status}" in
            2*)    exit 0 ;;
            000)   echo "::error::transport failure (timeout/DNS)"; exit 1 ;;
            *)     echo "::warning::unexpected status ${http_status}"; exit 1 ;;
          esac
